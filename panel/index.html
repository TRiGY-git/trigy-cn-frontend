<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generátor CN</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      background: #ffffff;
      color: #333;
      padding: 16px;
    }

    #demo-banner {
      display: none;
      background: #fff8dc;
      border: 1px solid #f0c040;
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 12px;
      color: #856404;
      margin-bottom: 12px;
    }


    #status {
      margin-top: 12px;
      min-height: 36px;
    }

    /* idle */
    .status-idle {
      font-size: 12px;
      color: #888;
    }

    /* loading */
    .status-loading {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #555;
    }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #d0b8e8;
      border-top-color: #79489c;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* success */
    .status-success {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .status-success .check-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #1a7d3c;
      font-weight: 600;
    }
    .status-success .check-row .check-icon {
      font-size: 16px;
    }
    .status-success .quote-number {
      font-size: 11px;
      color: #666;
    }
    .status-success a.pdf-link {
      font-size: 12px;
      color: #79489c;
      text-decoration: underline;
      word-break: break-all;
    }

    /* error */
    .status-error {
      font-size: 13px;
      color: #c0392b;
    }

    /* ─── CN history list ─── */
    #cn-history {
      display: none;
      margin-top: 16px;
    }
    #cn-history h3 {
      font-size: 12px;
      font-weight: 600;
      color: #79489c;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    #cn-history table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    #cn-history thead th {
      background: #f4f0f8;
      color: #666;
      font-weight: 600;
      text-align: left;
      padding: 4px 6px;
      border-bottom: 1px solid #e0d6ec;
      white-space: nowrap;
    }
    #cn-history tbody tr:nth-child(even) {
      background: #faf8fc;
    }
    #cn-history tbody td {
      padding: 4px 6px;
      color: #333;
      vertical-align: middle;
      white-space: nowrap;
    }
    #cn-history tbody td:first-child {
      font-weight: 700;
      color: #79489c;
    }
    #cn-history .cn-overflow {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
      text-align: right;
    }
  </style>
</head>
<body>
  <div id="demo-banner">Běžím mimo Pipedrive — demo režim</div>

  <div id="status">
    <div class="status-idle">Cenovou nabídku vytvoříte přes tlačítko <strong>Formulář</strong> u dealu.</div>
  </div>

  <!-- CN history list -->
  <div id="cn-history">
    <h3>Vygenerované CN</h3>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>Číslo CN</th>
            <th>Celkem</th>
            <th>Náklady</th>
            <th>Marže</th>
            <th>Režie</th>
            <th>Datum</th>
          </tr>
        </thead>
        <tbody id="cn-history-body"></tbody>
      </table>
    </div>
    <div class="cn-overflow" id="cn-overflow" style="display:none"></div>
  </div>

  <!-- Pipedrive App Extensions SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@pipedrive/app-extensions-sdk@0/dist/index.umd.js"></script>
  <script>
    (function () {
      const API_BASE = "https://dvcxqjlbyajqnkylmdya.supabase.co/functions/v1/api";

      const statusEl = document.getElementById('status');
      const demoBanner = document.getElementById('demo-banner');

      // Extract dealId from URL query params (?selectedIds=123 is appended by Pipedrive)
      const params = new URLSearchParams(location.search);
      let dealId = 0;
      const selectedIds = params.get('selectedIds');
      if (selectedIds) {
        const parsed = parseInt(selectedIds, 10);
        if (!isNaN(parsed)) dealId = parsed;
      }

      // Initialise Pipedrive SDK (defensive — outside Pipedrive it will fail)
      let sdkReady = false;
      let sdkInstance = null;
      try {
        const identifier = params.get('id') || undefined;
        const sdk = new AppExtensionsSDK(identifier ? { identifier } : undefined);
        sdk.initialize({ size: { height: 320 } })
          .then(function (ctx) {
            sdkReady = true;
            sdkInstance = sdk;
            // SDK context may carry the deal id; use it if available
            if (ctx && ctx.id && !isNaN(parseInt(ctx.id, 10))) {
              dealId = parseInt(ctx.id, 10);
            }
            // Load CN history after SDK is ready (inside Pipedrive, dealId known)
            if (dealId > 0) {
              getSignedToken().then(function (token) {
                if (token) loadCnHistory(token);
              });
            }
          })
          .catch(function () {
            // Running outside Pipedrive — show demo banner
            demoBanner.style.display = 'block';
          });
      } catch (e) {
        demoBanner.style.display = 'block';
      }

      /** Získá podepsaný token ze SDK, nebo null pokud mimo Pipedrive */
      function getSignedToken() {
        if (!sdkInstance) return Promise.resolve(null);
        return sdkInstance.execute('get_signed_token')
          .then(function (res) { return (res && res.token) ? res.token : null; })
          .catch(function () { return null; });
      }

      var cnHistoryEl = document.getElementById('cn-history');
      var cnHistoryBody = document.getElementById('cn-history-body');
      var cnOverflow = document.getElementById('cn-overflow');

      var MAX_ROWS = 5;

      function formatTotal(total) {
        if (total === null || total === undefined) return '—';
        return new Intl.NumberFormat('cs-CZ', { style: 'currency', currency: 'CZK', maximumFractionDigits: 0 }).format(total);
      }

      function formatMargin(margin) {
        if (margin === null || margin === undefined) return '—';
        return new Intl.NumberFormat('cs-CZ', { style: 'currency', currency: 'CZK', maximumFractionDigits: 0 }).format(margin);
      }

      function formatDate(isoStr) {
        if (!isoStr) return '—';
        return new Date(isoStr).toLocaleDateString('cs-CZ', { day: 'numeric', month: 'numeric', year: 'numeric' });
      }

      function loadCnHistory(token) {
        if (!dealId || dealId <= 0) return;
        fetch(API_BASE + '/quote/list?dealId=' + dealId, {
          headers: { 'Authorization': 'Bearer ' + token },
        })
          .then(function (res) { return res.json(); })
          .then(function (data) {
            if (!data.ok || !Array.isArray(data.quotes) || data.quotes.length === 0) {
              cnHistoryEl.style.display = 'none';
              return;
            }
            var quotes = data.quotes;
            var visible = quotes.slice(0, MAX_ROWS);
            var overflow = quotes.length - MAX_ROWS;

            cnHistoryBody.innerHTML = visible.map(function (q) {
              return '<tr>' +
                '<td>' + q.quoteNumber + '</td>' +
                '<td>' + formatTotal(q.total) + '</td>' +
                '<td>' + formatMargin(q.cost) + '</td>' +
                '<td>' + formatMargin(q.margin) + '</td>' +
                '<td>' + formatMargin(q.rezie) + '</td>' +
                '<td>' + formatDate(q.createdAt) + '</td>' +
                '</tr>';
            }).join('');

            if (overflow > 0) {
              cnOverflow.textContent = '(+' + overflow + ' starších)';
              cnOverflow.style.display = 'block';
            } else {
              cnOverflow.style.display = 'none';
            }

            cnHistoryEl.style.display = 'block';
          })
          .catch(function () {
            // Silently ignore errors in history load
          });
      }

      // Automatické generování z polí dealu je dočasně vypnuté — vstupy se zadávají
      // přes tlačítko „Formulář" u dealu. Panel jen zobrazuje historii CN.
    })();
  </script>

</body>
</html>
